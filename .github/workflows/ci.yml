# Staging URL and credentials live in GitHub Secrets / Variables — never commit .env.
# Required for full runs: repository secret BASE_URL (e.g. https://staging.example.com).
name: QA Engine CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      SKIP_GLOBAL_AUTH: "1"
      # Set in repo Settings → Secrets → BASE_URL (staging QA URL).
      BASE_URL: ${{ secrets.BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: List tests
        run: npm run test -- --list

      - name: Run tests (API + public UI)
        run: npm run test -- --project=api --project=ui

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
